site_name: quelware-client
site_description: Client libraries and tools for QuEL systems
site_url: https://quel-inc.github.io/quelware-client/
repo_url: https://github.com/quel-inc/quelware-client
repo_name: quel-inc/quelware-client
edit_uri: edit/main/docs/
copyright: Copyright &copy; QuEL, Inc.

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - quelware-client/src
            - quelware-core/python/src
          options:
            heading_level: 3
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            members_order: alphabetical
            filters:
              - "!^_"
            docstring_section_style: table
            merge_init_into_class: true
            show_if_no_docstring: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Client:
      - client/index.md
      - API Reference: client/api.md
  - Admin:
      - admin/index.md
  - Core:
      - core/index.md
