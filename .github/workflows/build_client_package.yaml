name: Build quelware-client Package

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'quelware-client/v*'
  pull_request:
    paths:
      - '.github/workflows/build_client_package.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
          enable-cache: true

      - name: Build quelware-client
        run: uv build
        working-directory: ./quelware-client

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quelware-client-package
          path: ./quelware-client/dist/
          retention-days: 14
