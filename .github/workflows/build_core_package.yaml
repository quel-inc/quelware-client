name: Build quelware-core Package

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'quelware-core/v*'
  pull_request:
    paths:
      - '.github/workflows/build_core_package.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
          enable-cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf codes
        run: make generate
        working-directory: ./quelware-core

      - name: Build quelware-core
        run: uv build
        working-directory: ./quelware-core/python

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quelware-core-package
          path: ./quelware-core/python/dist/
          retention-days: 14
