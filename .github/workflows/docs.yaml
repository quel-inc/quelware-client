name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "quelware-client/src/**"
      - "quelware-core/python/src/**"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read

# Only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Publish only from the public mirror. On the private repo this workflow
    # runs but is skipped (no deployment, no failing runs).
    if: github.repository == 'quel-inc/quelware-client'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build site
        run: make docs-build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.repository == 'quel-inc/quelware-client'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
