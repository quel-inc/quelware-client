syntax = "proto3";

package quelware.maintenance.v1;

import "google/protobuf/timestamp.proto";

option go_package = "quelware-core-go/quelware/maintenance/v1";

service MaintenanceService {
  // Bring each target unit to a usable state. Each unit is expected to be in
  // MAINTENANCE.
  rpc StartCommission(StartCommissionRequest) returns (StartCommissionResponse);

  // Poll the state of a previously started job.
  rpc GetMaintenanceJob(GetMaintenanceJobRequest) returns (GetMaintenanceJobResponse);
}

enum JobKind {
  JOB_KIND_UNSPECIFIED = 0;
  JOB_KIND_COMMISSION = 1;
}

enum JobPhase {
  JOB_PHASE_UNSPECIFIED = 0;
  JOB_PHASE_DRAINING = 1;
  JOB_PHASE_SYNCING = 2;
  JOB_PHASE_LINKING = 3;
  JOB_PHASE_DONE = 4;
  JOB_PHASE_FAILED = 5;
}

enum UnitOutcome {
  UNIT_OUTCOME_UNSPECIFIED = 0;
  UNIT_OUTCOME_OK = 1;
  UNIT_OUTCOME_SKIPPED = 2;
  UNIT_OUTCOME_FAILED = 3;
}

message UnitProgress {
  string unit_label = 1;
  string phase = 2;
  UnitOutcome outcome = 3;
  string detail = 4;
}

message MaintenanceJob {
  string job_id = 1;
  JobKind kind = 2;
  JobPhase phase = 3;
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp finished_at = 5;
  string error = 6;
  repeated UnitProgress unit_progress = 7;
}

message StartCommissionRequest {
  // If true, skip any unit whose link status currently reports healthy. If
  // false (default), fully reset all state and bring every unit up from scratch.
  bool preserve_healthy = 1;
}

message StartCommissionResponse {
  string job_id = 1;
}

message GetMaintenanceJobRequest {
  string job_id = 1;
}

message GetMaintenanceJobResponse {
  MaintenanceJob job = 1;
}
