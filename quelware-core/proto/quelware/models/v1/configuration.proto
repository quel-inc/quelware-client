syntax = "proto3";

package quelware.models.v1;

message Unit {
  string label = 1;
  UnitStatus status = 2;
}

message WorkerStatus {
  bool can_accept_tasks = 1;
  bool is_linked_up = 2;
  bool is_synchronized = 3;
}

enum UnitStatus {
  UNIT_STATUS_UNSPECIFIED = 0;
  UNIT_STATUS_ACTIVE = 1;
  UNIT_STATUS_DRAINING = 2;
  UNIT_STATUS_RELEASED = 3;
  UNIT_STATUS_UNAVAILABLE = 4;
  UNIT_STATUS_INITIALIZING = 5;
  UNIT_STATUS_MAINTENANCE = 6;
  UNIT_STATUS_STANDBY = 7;
}
